name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Build wasm (Rust -> web/pkg)
        run: ./build-wasm.sh

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Minify HTML/CSS/JS into dist/
        run: |
          mkdir -p dist/pkg
          npx -y html-minifier-terser@7 \
            --collapse-whitespace --remove-comments --minify-css true \
            --minify-js '{"module":true,"compress":true,"mangle":true}' \
            -o dist/index.html web/index.html
          npx -y terser@5 web/pkg/astro_recover.js --module --compress --mangle \
            -o dist/pkg/astro_recover.js
          cp web/pkg/astro_recover_bg.wasm dist/pkg/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
